<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login o registro</title>
    <link rel="stylesheet" href="stylelogin.css">
    <link href="https://cdn.jsdelivr.net/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1>iniciar sesion</h1>
    <form id="formulario-login">
        <div class="input-box">
            <input type="text" id="nombre" placeholder="Nombre de usuario" required>
            <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Contraseña" required>
            <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="remember-password">
            <label><input type="checkbox"> Recordarme</label>
            <a href="#">¿olvidaste tu contraseña?</a>
        </div>
        <p id="mensaje" style="color: rgb(79, 238, 39);"></p>
        <button class="btn" type="submit">INGRESAR</button>
        <p class="register-link">Si no tiene cuenta
            <a href="#">Registrarse</a></p> 
    </form>
</div>
<script>
document.getElementById('formulario-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = document.getElementById('nombre').value;
    const password = document.getElementById('password').value;
    const respuesta = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ nombre, password })
    });
    const datos = await respuesta.json();
    if (datos.ok) {
        window.location.href = '../index.html';
    } else {
        document.getElementById('mensaje').textContent = datos.mensaje;
    }
});
</script>   
</body>
</html>
