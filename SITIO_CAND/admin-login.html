<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - TECNOCAND</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: bold;
        }

        .login-header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .login-body {
            padding: 40px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating > label {
            color: #6c757d;
        }

        .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-custom {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: none;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .form-group-wrapper {
            position: relative;
        }

        .icon-input {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            z-index: 10;
        }

        .form-control-with-icon {
            padding-left: 45px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 30px;
            font-size: 0.9rem;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            padding: 20px;
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            font-size: 0.9rem;
            color: #6c757d;
        }

        .demo-credentials {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .demo-credentials strong {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .login-header h1 {
                font-size: 2rem;
            }

            .login-body {
                padding: 30px 20px;
            }
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #667eea;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <h1>
                    <i class="fas fa-lock"></i> ADMIN
                </h1>
                <p>Panel Administrativo TECNOCAND</p>
            </div>

            <!-- Body -->
            <div class="login-body">
                <!-- Alert -->
                <div id="alert-container"></div>

                <!-- Form -->
                <form id="login-form">
                    <!-- Usuario -->
                    <div class="form-group-wrapper mb-3">
                        <i class="fas fa-user icon-input"></i>
                        <input 
                            type="text" 
                            class="form-control form-control-with-icon" 
                            id="username" 
                            name="username"
                            placeholder="Usuario"
                            required
                            autocomplete="username"
                        >
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group-wrapper mb-3">
                        <i class="fas fa-lock icon-input"></i>
                        <input 
                            type="password" 
                            class="form-control form-control-with-icon" 
                            id="password" 
                            name="password"
                            placeholder="Contraseña"
                            required
                            autocomplete="current-password"
                        >
                        <i class="fas fa-eye-slash eye-icon" id="toggle-password"></i>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="remember-forgot">
                        <label class="form-check-label">
                            <input type="checkbox" class="form-check-input" id="remember"> Recuérdame
                        </label>
                        <a href="#" onclick="alert('Contacte al administrador'); return false;">¿Olvidó contraseña?</a>
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn btn-primary btn-login" id="btn-login">
                        <span id="login-text">Iniciar Sesión</span>
                        <span id="login-spinner" class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>

                <!-- Demo Info -->
                <div class="demo-credentials">
                    <strong>🔐 Credenciales de Demo:</strong><br>
                    Usuario: <strong>admin</strong><br>
                    Contraseña: <strong>admin123</strong>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                © 2026 TECNOCAND - Todos los derechos reservados
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
