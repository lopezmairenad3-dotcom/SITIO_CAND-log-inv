<!DOCTYPE html>
<html lang="es">
<head>
    <!--Declarando los meta-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-sacle=1.0">
    <meta http-equiv="X-UA-Compatible" contente="IE=edge">
    <title>TECNOCAND</title>
    <!--Mandar a llamar el MAIN donde se guardan los estilos de la página-->
    <link rel="stylesheet" type="text/css" href="css/estilos.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>


<body>
<!--definiendo el contenedor principal-->
<div class="wrapper">
     <!--Para el menú móvil-->
     <header class="header-mobile">
        <h1 class="logo">TECNOCAND</h1>
        <button class="open-menu" id="open-menu">
            <i class="bi bi-list"></i>
        </button>

    </header>
    <!--definiendo el menú lateral-->
    <aside>
        <!--PARA CERRAR EL MENU MOVIL-->
        <button class="close-menu" id="close-menu">
            <i class="bi bi-x"></i>
        </button>
         <!--definiendo el encabezado del menú lateral-->
        <header>
            <h1 class="logo">TECNOCAND</h1>
        </header>
            <!--definiendo cada menú-->
            <nav>

                <ul>
                    <li>
                        <a class="boton-menu boton-volver" href="./Index.html">
                            <i class="bi bi-arrow-return-left"></i></i>Seguir Comprando
                        </a>
                    </li>
                  
                    <li>
                        <a class="boton-menu boton-carrito active" href="./carrito.html">
                            <i class="bi bi-cart-plus-fill"></i>Carrito
                        </a>
                    </li>
                </ul>

            </nav>
    <footer>
        <p class="text-footer">© 2026 TECNOCAND</p>
    </footer>
        
    </aside>
    <main>
        <h2 class="titulo-principal">Carrito</h2>
        <!--creando el menú de productos-->
        <div class="contenedor-carrito">
            <p id="carrito-vacio" class="carrito-vacio">
               Tu carrito está vacío <i class="bi bi-emoji-dizzy"></i>
            </p>
            <div id="carrito-productos" class="carrito-productos disabled">
                <!-- ESTO PASÓ AL JS  -->           
           </div>
            <div id="carrito-acciones" class="carrito-acciones disabled">
                <div class="carrito-acciones-izquierda">
                    <button id="carrito-acciones-vaciar" class="carrito-acciones-vaciar">Vaciar carrito</button>
                </div>
                <div class="carrito-acciones-derecha">
                    <div class="carrito-acciones-total">
                        <p>Total:</p>
                        <p id="total">$25</p>
                    </div>
                    <button id="carrito-acciones-comprar" class="carrito-acciones-comprar">Comprar ahora</button>
                </div>
            </div>
            <p id="carrito-comprado" class="carrito-comprado disabled">
                Muchas Gracias por su compra! <i class="bi bi-emoji-smile"></i>
             </p>
        </div>
    </main>

</div>

<!-- Mando a llamar el archivo JSON-->
<script src="./js/carrito.js"></script>
<script src="./js/menu.js"></script>

</body>


</html>
